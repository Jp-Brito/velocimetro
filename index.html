<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Velocímetro" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Velocímetro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0a;
      --bg2:     #141414;
      --bg3:     #1e1e1e;
      --text:    #f0f0f0;
      --muted:   #666;
      --accent:  #1dcc8a;
      --danger:  #e05a2b;
      --warn:    #e0a82b;
      --border:  rgba(255,255,255,0.08);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      user-select: none;
    }

    #app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding:
        calc(var(--safe-top) + 1.25rem)
        1.25rem
        calc(var(--safe-bot) + 1.25rem);
    }

    /* status bar */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 1.5rem;
    }

    #gps-status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--muted);
    }
    #dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.4s;
    }
    #dot.on  { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    #dot.err { background: var(--danger); }

    /* wake lock button */
    #btn-wake {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
    }
    #btn-wake.active {
      border-color: rgba(29,204,138,0.4);
      background: rgba(29,204,138,0.1);
      color: var(--accent);
    }
    #btn-wake.unavailable {
      border-color: rgba(224,168,43,0.3);
      background: rgba(224,168,43,0.08);
      color: var(--warn);
    }
    #wake-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* main speed */
    #speed-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #speed-num {
      font-size: clamp(100px, 28vw, 140px);
      font-weight: 200;
      line-height: 1;
      letter-spacing: -4px;
      color: var(--text);
      transition: color 0.3s;
      font-variant-numeric: tabular-nums;
    }
    #speed-num.moving { color: var(--accent); }

    #speed-unit {
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    #accuracy {
      font-size: 11px;
      color: var(--muted);
      margin-top: 0.75rem;
      min-height: 16px;
    }

    /* stat cards */
    #stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      margin-top: 1.5rem;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.25rem;
    }
    .card-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 8px;
    }
    .dot-max { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .dot-min { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); }
    .card-value {
      font-size: 36px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
    }
    .card-unit { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* buttons row */
    #btn-row {
      display: flex;
      gap: 10px;
      margin-top: 1.25rem;
      width: 100%;
    }
    #btn-reset {
      flex: 1;
      padding: 11px 0;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
    }
    #btn-reset:active { background: var(--bg2); color: var(--text); }

    /* error */
    #error-box {
      display: none;
      margin-top: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      background: rgba(224,90,43,0.1);
      border: 1px solid rgba(224,90,43,0.25);
      font-size: 13px;
      color: #f08060;
      text-align: center;
      line-height: 1.5;
      width: 100%;
    }

    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

    /* splash screen */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 9999;
      flex-direction: column;
      gap: 2rem;
      padding: 2rem;
    }

    #splash-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      align-items: center;
    }

    #splash h1 {
      font-size: 42px;
      font-weight: 300;
      letter-spacing: -1px;
      margin: 0;
    }

    #splash p {
      font-size: 14px;
      color: var(--muted);
      max-width: 280px;
      line-height: 1.6;
      margin: 0;
    }

    #btn-start {
      padding: 14px 40px;
      border-radius: 100px;
      border: 2px solid var(--accent);
      background: rgba(29,204,138,0.15);
      color: var(--accent);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.25s;
      min-width: 180px;
      letter-spacing: 0.05em;
    }

    #btn-start:active {
      background: rgba(29,204,138,0.25);
      transform: scale(0.95);
    }

    #splash.hidden {
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease-out;
    }

    #app {
      opacity: 0;
      transition: opacity 0.4s ease-out 0.2s;
    }

    #app.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div id="splash-content">
    <div>
      <h1>Velocímetro</h1>
      <p>Rastreie sua velocidade em tempo real com GPS</p>
    </div>
    <button id="btn-start">INICIAR</button>
  </div>
</div>

<div id="app">

  <div id="status-bar">
    <div id="gps-status">
      <div id="dot"></div>
      <span id="status-text">Aguardando GPS…</span>
    </div>
    <button id="btn-wake" onclick="toggleWakeLock()">
      <span id="wake-dot"></span>
      <span id="wake-label">Tela acesa</span>
    </button>
  </div>

  <div id="speed-wrap">
    <div id="speed-num">--</div>
    <div id="speed-unit">km / h</div>
    <div id="accuracy"></div>
  </div>

  <div id="stats">
    <div class="card">
      <div class="card-label"><span class="dot-max"></span> Máxima</div>
      <div class="card-value" id="max-val">--</div>
      <div class="card-unit">km/h</div>
    </div>
    <div class="card">
      <div class="card-label"><span class="dot-min"></span> Mínima</div>
      <div class="card-value" id="min-val">--</div>
      <div class="card-unit">km/h</div>
    </div>
  </div>

  <div id="btn-row">
    <button id="btn-reset">↺ Resetar máx / mín</button>
  </div>

  <div id="error-box"></div>

</div>
<script>
  const numEl    = document.getElementById('speed-num');
  const maxEl    = document.getElementById('max-val');
  const minEl    = document.getElementById('min-val');
  const dotEl    = document.getElementById('dot');
  const statusEl = document.getElementById('status-text');
  const accEl    = document.getElementById('accuracy');
  const errBox   = document.getElementById('error-box');
  const btnReset = document.getElementById('btn-reset');
  const btnWake  = document.getElementById('btn-wake');
  const wakeLabel = document.getElementById('wake-label');
  const splash   = document.getElementById('splash');
  const appEl    = document.getElementById('app');
  const btnStart = document.getElementById('btn-start');

  let maxSpeed = null;
  let minSpeed = null;
  let watchId  = null;
  let wakeLock = null;
  let audioCtx = null;
  let isActive = false;
  const supportsWakeLock = 'wakeLock' in navigator;

  const MIN_KMH = 1.5;
  const fmt = v => Math.round(v);

  // ── SPLASH SCREEN + INITIAL ACTIVATION ──
  async function startApp() {
    isActive = true;
    
    // 1. Ativa áudio silencioso (exigido por iOS)
    startSilentAudio();
    
    // 2. Pede Wake Lock (agora com gesto do usuário explícito)
    await acquireWakeLock();
    
    // 3. Mostra app e esconde splash
    splash.classList.add('hidden');
    setTimeout(() => {
      splash.style.display = 'none';
      appEl.classList.add('visible');
    }, 400);
    
    // 4. Inicia GPS
    startGPS();
  }

  btnStart.addEventListener('click', startApp);

  // ── GPS ──
  function onPosition(pos) {
    const { speed, accuracy } = pos.coords;
    dotEl.className = 'on';
    statusEl.textContent = 'GPS ativo';
    errBox.style.display = 'none';
    accEl.textContent = accuracy != null ? `precisão ± ${Math.round(accuracy)} m` : '';
    const kmh = (speed != null && speed >= 0) ? speed * 3.6 : 0;
    numEl.textContent = fmt(kmh);
    numEl.className   = kmh >= MIN_KMH ? 'moving' : '';
    if (kmh >= MIN_KMH) {
      if (maxSpeed === null || kmh > maxSpeed) { maxSpeed = kmh; maxEl.textContent = fmt(maxSpeed); }
      if (minSpeed === null || kmh < minSpeed) { minSpeed = kmh; minEl.textContent = fmt(minSpeed); }
    }
  }

  function onError(err) {
    dotEl.className = 'err';
    statusEl.textContent = 'Erro no GPS';
    numEl.textContent = '--';
    numEl.className = '';
    const msgs = {
      1: 'Permissão negada. Vá em Ajustes › Privacidade › Localização e permita o acesso.',
      2: 'Sinal GPS indisponível. Tente em área aberta.',
      3: 'Tempo esgotado. Tentando novamente…'
    };
    errBox.textContent = msgs[err.code] || 'Não foi possível acessar o GPS.';
    errBox.style.display = 'block';
    if (err.code === 3) setTimeout(startGPS, 3000);
  }

  function startGPS() {
    if (!('geolocation' in navigator)) {
      errBox.textContent = 'GPS não suportado neste navegador.';
      errBox.style.display = 'block';
      return;
    }
    if (watchId !== null) navigator.geolocation.clearWatch(watchId);
    statusEl.textContent = 'Localizando…';
    watchId = navigator.geolocation.watchPosition(onPosition, onError, {
      enableHighAccuracy: true,
      maximumAge: 800,
      timeout: 12000
    });
  }

  // ── Wake Lock ──
  function updateWakeUI() {
    if (!supportsWakeLock) {
      btnWake.className = 'unavailable';
      wakeLabel.textContent = 'Sem suporte';
      return;
    }
    if (wakeLock) {
      btnWake.className = 'active';
      wakeLabel.textContent = 'Tela acesa ✓';
    } else {
      btnWake.className = '';
      wakeLabel.textContent = 'Tela acesa';
    }
  }

  async function acquireWakeLock() {
    if (!supportsWakeLock) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => {
        wakeLock = null;
        updateWakeUI();
      });
      updateWakeUI();
    } catch(e) {
      wakeLock = null;
      updateWakeUI();
    }
  }

  async function toggleWakeLock() {
    if (wakeLock) {
      await wakeLock.release();
      wakeLock = null;
      updateWakeUI();
    } else {
      await acquireWakeLock();
    }
  }

  btnReset.addEventListener('click', () => {
    maxSpeed = null; minSpeed = null;
    maxEl.textContent = '--'; minEl.textContent = '--';
  });

  // ── SILENT AUDIO (iOS) ──
  // O iOS suspende PWA sem áudio ativo. Oscilador com gain quase zero.
  function startSilentAudio() {
    try {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      gain.gain.value = 0.00001; // inaudível mas ativo
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
    } catch(e) {}
  }

  // Renova ao voltar ao foco (wake lock + áudio)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && isActive) {
      if (!wakeLock && supportsWakeLock) acquireWakeLock();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      startGPS();
    }
  });

  // Init - mostra splash e aguarda clique
  updateWakeUI();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/velocimetro/sw.js', { scope: '/velocimetro/' }).catch(() => {});
  }
</script>
</body>
</html>
